<!DOCTYPE html>
<html lang="it" style="background:#07080d">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MarketRadar">
<meta name="theme-color" content="#07080d">
<meta name="color-scheme" content="dark">
<title>Market Correction Radar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{color-scheme:dark;--bg:#07080d;--card:#0d0f18;--bd:#1c1f30;--txt:#e8eaf2;--mt:#6b7280}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;min-height:100dvh;overflow-x:hidden}
.safe-top{height:calc(env(safe-area-inset-top,0px) + 16px)}
.main{padding:0 16px 40px;max-width:460px;margin:0 auto}
.gauge-title{text-align:center;padding-top:20px;margin-bottom:12px;font-size:15px;font-weight:700;letter-spacing:.04em}
.gauge-title span{color:var(--mt);font-weight:400}
.gwrap{display:flex;flex-direction:column;align-items:center;margin-bottom:4px}
svg.g{width:100%;max-width:300px;overflow:visible}
.sblock{margin-top:-8px;text-align:center}
.srow{display:flex;align-items:flex-start;justify-content:center}
.snum{font-size:58px;font-weight:800;letter-spacing:-2px;line-height:1;font-variant-numeric:tabular-nums;transition:color .5s;color:var(--mt)}
.spct{font-size:24px;font-weight:700;margin-top:10px;margin-left:2px;opacity:.75;transition:color .5s;color:var(--mt)}
.rpill{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-top:8px;transition:all .5s;background:#1c1f30;color:var(--mt)}
.upd{font-size:11px;color:var(--mt);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:5px}
.updot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0}
.stale{font-size:10px;color:#f97316;margin-top:4px;display:none}
.summ{background:var(--card);border:1px solid var(--bd);border-radius:13px;padding:14px 16px;margin:18px 0 14px;font-size:13px;line-height:1.65;color:#9ca3af}
.shd{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--mt);margin:0 0 10px}
.tbox{background:var(--card);border:1px solid var(--bd);border-radius:13px;padding:13px 16px;margin-bottom:16px}
.sigs{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.sig{background:var(--card);border:1px solid var(--bd);border-radius:13px;padding:12px 14px}
.sig.markets-sig{border-color:#252840}
.sigtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sigl{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.sigfl{font-size:15px;line-height:1;flex-shrink:0}
.signame{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wt{font-size:11px;font-weight:700;color:#c0c8e0;flex-shrink:0}
.ibtn{width:18px;height:18px;border-radius:50%;background:#1a1d2e;border:1px solid #303668;color:#7c85b0;font-size:10px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-style:italic;transition:all .15s}
.ibtn:active{background:#303668;color:#a5b4fc}
.sigr{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px}
.sigscore{font-size:22px;font-weight:800;min-width:32px;text-align:right;font-variant-numeric:tabular-nums}
.sigtnd{font-size:12px;width:14px;text-align:center}
.barbg{background:#1a1d2e;border-radius:4px;height:4px;margin-bottom:7px;overflow:hidden}
.barfill{height:100%;border-radius:4px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.sigdet{font-size:11px;color:var(--mt);line-height:1.45}
.sub-badge{font-size:9px;font-weight:700;letter-spacing:.1em;color:#4a5280;background:#141628;border:1px solid #252840;border-radius:8px;padding:2px 7px;margin-left:4px;flex-shrink:0}
.iov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:80;align-items:center;justify-content:center;padding:20px 16px}
.iov.open{display:flex}
.ipnl{background:#0e1020;border:1px solid #1c2044;border-radius:18px;padding:22px 20px 28px;width:100%;max-width:440px;max-height:82vh;overflow-y:auto;position:relative}
.iov.open .ipnl{animation:popIn .25s cubic-bezier(.34,1.2,.64,1) both}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.6;box-shadow:0 0 0 5px rgba(34,197,94,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.iclose{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;background:#1a1d2e;border:1px solid var(--bd);color:var(--mt);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ititle{font-size:15px;font-weight:700;color:#e8eaf2;margin-bottom:8px;padding-right:32px;line-height:1.3}
.idesc{font-size:13px;color:#9ca3af;line-height:1.7;margin-bottom:16px}
.isrchd{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mt);margin-bottom:8px}
.isrc{font-size:12px;color:#818cf8;margin-bottom:5px;display:flex;align-items:baseline;gap:5px}
.isrc::before{content:"•";flex-shrink:0}
.sub-divider{border:none;border-top:1px solid #1c1f30;margin:14px 0}
.sub-hd{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mt);margin-bottom:12px}
.sub-row{margin-bottom:12px}
.sub-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sub-label{font-size:12px;font-weight:600;color:#c8cce0}
.sub-right{display:flex;align-items:center;gap:6px}
.sub-wt{font-size:10px;color:#4a5280}
.sub-score{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}
.sub-tnd{font-size:11px}
.sub-bar-bg{height:3px;background:#1a1d2e;border-radius:2px;margin-bottom:4px;overflow:hidden}
.sub-bar-fill{height:100%;border-radius:2px}
.sub-detail{font-size:10px;color:#5a6070;line-height:1.4}
.ovl{display:none;position:fixed;inset:0;background:rgba(7,8,13,.9);z-index:90;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.ovl.on{display:flex}
.spnlg{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#6366f1;border-radius:50%;animation:spin .85s linear infinite}
.lmsg{font-size:13px;color:var(--mt)}
.foot{text-align:center;font-size:10px;color:#2a2e3a;padding:0 16px 32px}
</style>
</head>
<body style="background:#07080d">

<div class="safe-top"></div>

<div class="main">
  <div class="gauge-title">🌍 Market Correction <span>Radar</span></div>

  <div class="gwrap">
    <svg class="g" viewBox="0 0 300 195" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ag" x1="44.8" y1="0" x2="255.2" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#00e67a"/>
          <stop offset="5%"   stop-color="#00e67a"/>
          <stop offset="9%"   stop-color="#fbbf24"/>
          <stop offset="50%"  stop-color="#fbbf24"/>
          <stop offset="53%"  stop-color="#f97316"/>
          <stop offset="93%"  stop-color="#f97316"/>
          <stop offset="96%"  stop-color="#ef4444"/>
          <stop offset="100%" stop-color="#ef4444"/>
        </linearGradient>
      </defs>
      <path id="gtrack" fill="none" stroke="#1c1f30" stroke-width="13" stroke-linecap="round"/>
      <path id="garc" fill="none" stroke="url(#ag)" stroke-width="13" stroke-linecap="round" d=""/>
      <line id="gneedle" x1="150" y1="148" x2="45" y2="187" stroke="#9aa0bb" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      <circle cx="150" cy="148" r="5" fill="#d0d4e8"/>
    </svg>
    <div class="sblock">
      <div class="srow">
        <span class="snum" id="snum">--</span>
        <span class="spct" id="spct">%</span>
      </div>
      <div class="rpill" id="rpill">Caricamento…</div>
      <div class="upd" id="upd" style="display:none">
        <div class="updot"></div>
        <span id="updtxt"></span>
      </div>
      <div class="stale" id="stale">⚠ Dati non aggiornati oggi</div>
    </div>
  </div>

  <div class="summ" id="summ">Caricamento dati in corso…</div>

  <div class="tbox">
    <div class="shd">Trend settimanale</div>
    <div id="spark" style="width:100%;height:80px;position:relative"></div>
  </div>

  <div class="shd" id="sighd" style="margin-bottom:8px"></div>
  <div class="sigs" id="sigs"></div>
</div>

<div class="foot">Market Correction Radar · Solo scopi informativi · Non è consulenza finanziaria</div>

<div class="iov" id="iov" onclick="if(event.target===this)closeInfo()">
  <div class="ipnl" id="ipnl">
    <button class="iclose" onclick="closeInfo()">✕</button>
    <div id="ipcnt"></div>
  </div>
</div>

<div class="ovl" id="ovl">
  <div class="spnlg"></div>
  <div class="lmsg" id="lmsg">Caricamento dati…</div>
</div>

<script>
/* ── GAUGE ───────────────────────────────────────────────── */
const CX=150,CY=148,R=112,RN=90,SA=160,SP=220;
function vpt(deg,r){const a=deg*Math.PI/180;return[CX+r*Math.cos(a),CY+r*Math.sin(a)];}
const[SX,SY]=vpt(SA,R);const[EX,EY]=vpt(SA+SP,R);
document.getElementById('gtrack').setAttribute('d',`M${SX} ${SY} A${R} ${R} 0 1 1 ${EX} ${EY}`);

function arcPath(v){
  if(v<=0)return'';
  if(v>=99.9)return`M${SX} ${SY} A${R} ${R} 0 1 1 ${EX-.01} ${EY}`;
  const[ex,ey]=vpt(SA+SP*v/100,R);
  return`M${SX} ${SY} A${R} ${R} 0 ${SP*v/100>180?1:0} 1 ${ex} ${ey}`;
}
function col(v){return v<26?'#00e67a':v<51?'#fbbf24':v<76?'#f97316':'#ef4444'}
function rlbl(v){return v<26?'Minga mal':v<51?'Ocio':v<76?'Dàghela via':'Roba de matt'}

function animScore(target){
  const sn=document.getElementById('snum'),sp=document.getElementById('spct');
  const start=parseInt(sn.textContent)||0,t0=performance.now();
  const needle=document.getElementById('gneedle');needle.style.opacity='1';
  (function step(now){
    const p=Math.min((now-t0)/1100,1),e=1-Math.pow(1-p,3);
    const cur=Math.round(start+(target-start)*e),c=col(cur);
    sn.textContent=cur;sn.style.color=c;sp.style.color=c;needle.style.stroke=c;
    document.getElementById('garc').setAttribute('d',arcPath(cur));
    const[nx,ny]=vpt(SA+SP*cur/100,RN);
    needle.setAttribute('x2',nx);needle.setAttribute('y2',ny);
    if(p<1)requestAnimationFrame(step);
    else{sn.textContent=target;const fc=col(target);sn.style.color=fc;sp.style.color=fc;needle.style.stroke=fc;}
  })(t0);
}

/* ── HELPERS ─────────────────────────────────────────────── */
function nextUpdateTime(){
  const now=new Date();
  const slots=[4,16];
  for(const h of slots){
    if(now.getUTCHours()<h||(now.getUTCHours()===h&&now.getUTCMinutes()===0)){
      const next=new Date(now);next.setUTCHours(h,0,0,0);
      return'oggi alle '+next.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    }
  }
  const tomorrow=new Date(now);
  tomorrow.setUTCDate(tomorrow.getUTCDate()+1);
  tomorrow.setUTCHours(4,0,0,0);
  const dow=tomorrow.getDay();
  if(dow===6)tomorrow.setUTCDate(tomorrow.getUTCDate()+2);
  if(dow===0)tomorrow.setUTCDate(tomorrow.getUTCDate()+1);
  return'domani alle '+tomorrow.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

function trendHtml(t){
  const map={up:['▲','#ef4444'],down:['▼','#22c55e'],stable:['▬','#6b7280']};
  const[sym,c]=map[t]||map.stable;
  return'<span class="sigtnd" style="color:'+c+'">'+sym+'</span>';
}

const SIG_META={
  markets:{icon:'📊'},insider:{icon:'👔'},
  ipo_fever:{icon:'🚀'},retail_frenzy:{icon:'🛒'},skyscraper:{icon:'🏗️'}
};

/* ── RENDER ──────────────────────────────────────────────── */
let hist=[],lastSignals=null;

function renderSigs(sigs){
  document.getElementById('sighd').textContent='Segnali ('+sigs.length+')';
  document.getElementById('sigs').innerHTML=sigs.map(function(s){
    var icon=(SIG_META[s.id]||{icon:'📌'}).icon;
    var isMkts=s.id==='markets';
    return '<div class="sig'+(isMkts?' markets-sig':'')+'">'+
      '<div class="sigtop">'+
        '<div class="sigl">'+
          '<span class="sigfl">'+icon+'</span>'+
          '<span class="signame">'+s.label+'</span>'+
          '<span class="wt">'+s.weight+'%</span>'+
          (isMkts?'<span class="sub-badge">10 indici</span>':'')+
          '<button class="ibtn" onclick="openInfo(\''+s.id+'\')">i</button>'+
        '</div>'+
        '<div class="sigr">'+
          '<span class="sigscore" style="color:'+col(s.score)+'">'+s.score+'</span>'+
          trendHtml(s.trend)+
        '</div>'+
      '</div>'+
      '<div class="barbg"><div class="barfill" style="width:'+s.score+'%;background:'+col(s.score)+'"></div></div>'+
      '<div class="sigdet">'+s.detail+'</div>'+
    '</div>';
  }).join('');
}

function drawSpark(){
  var c=document.getElementById('spark');
  if(!c||!c.offsetParent&&c.offsetWidth===0)return;
  var dpr=window.devicePixelRatio||1,w=c.offsetWidth||280,h=42;
  c.width=w*dpr;c.height=h*dpr;
  var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  if(hist.length<2){
    ctx.strokeStyle='#1c1f30';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();
    ctx.fillStyle='#374151';ctx.font='11px -apple-system';ctx.textAlign='center';
    ctx.fillText('Nessun dato storico disponibile',w/2,36);return;
  }
  var pts=hist.map(function(v,i){return{x:(i/(hist.length-1))*(w-16)+8,y:h-6-(v/100)*(h-12)};});
  var grd=ctx.createLinearGradient(0,0,0,h);
  grd.addColorStop(0,'rgba(99,102,241,.35)');grd.addColorStop(1,'rgba(99,102,241,0)');
  ctx.beginPath();ctx.moveTo(pts[0].x,h);
  pts.forEach(function(p){ctx.lineTo(p.x,p.y);});
  ctx.lineTo(pts[pts.length-1].x,h);ctx.closePath();
  ctx.fillStyle=grd;ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  pts.forEach(function(p){ctx.lineTo(p.x,p.y);});
  ctx.strokeStyle='#6366f1';ctx.lineWidth=2;ctx.stroke();
  var lp=pts[pts.length-1];
  ctx.beginPath();ctx.arc(lp.x,lp.y,3,0,Math.PI*2);ctx.fillStyle='#818cf8';ctx.fill();
}
window.addEventListener('resize',drawSpark);

/* ── INFO ────────────────────────────────────────────────── */
var SINFO={
  insider:{title:'Insider Selling Ratio',desc:'Monitora il rapporto tra vendite e acquisti di azioni proprie da parte di CEO, CFO e altri dirigenti sul mercato aperto. USA: Form 4 depositati alla SEC entro 2 giorni. Quando il ratio è elevato su più settori, indica che chi ha accesso diretto ai dati aziendali si sta alleggerendo.',src:['SEC EDGAR Form 4 filings','Bloomberg Corporate Insider Data','VerityData','OpenInsider.com']},
  ipo_fever:{title:'IPO Fever Index',desc:'Percentuale di IPO con EBITDA negativo negli ultimi 90 giorni, numero di SPAC attivi, multipli price/sales medi. Valori elevati indicano che il mercato finanzia narrative di crescita ignorando i fondamentali.',src:['Renaissance Capital IPO Monitor','SEC S-1 filings','Bloomberg IPO Data','SPAC Research']},
  retail_frenzy:{title:'Retail Frenzy Index',desc:'Google Trends su keyword finanziarie, volume opzioni 0DTE retail, adozione asset speculativi. Proxy di euforia popolare. Storicamente picca 4-8 settimane prima del top di mercato.',src:['Google Trends API','CBOE Options Data','Reddit r/wallstreetbets','Vanda Research Retail Flow']},
  skyscraper:{title:'Skyscraper & Excess Index',desc:'Grattacieli record annunciati globalmente (Skyscraper Index Barclays 2012), backlog superyacht e jet privati, record nelle aste d\'arte contemporanea. Segnale di fase del ciclo su scala di mesi-anni.',src:['CTBUH Council on Tall Buildings','Superyacht Fan Order Book','Christie\'s e Sotheby\'s','GAMA Aviation Data']}
};

function openInfo(id){
  var cnt=document.getElementById('ipcnt');
  if(id==='markets'){
    var mkts=lastSignals&&lastSignals.find(function(s){return s.id==='markets';});
    if(!mkts){cnt.innerHTML='<div style="color:var(--mt);font-size:13px">Carica prima i dati.</div>';}
    else{
      var subRows=(mkts.subsignals||[]).map(function(ss){
        return '<div class="sub-row">'+
          '<div class="sub-row-top">'+
            '<span class="sub-label">'+ss.label+'</span>'+
            '<div class="sub-right">'+
              '<span class="sub-wt">'+ss.weight+'%</span>'+
              '<span class="sub-score" style="color:'+col(ss.score)+'">'+ss.score+'</span>'+
              '<span class="sub-tnd" style="color:'+(ss.trend==='up'?'#ef4444':ss.trend==='down'?'#22c55e':'#6b7280')+'">'+(ss.trend==='up'?'▲':ss.trend==='down'?'▼':'▬')+'</span>'+
            '</div>'+
          '</div>'+
          '<div class="sub-bar-bg"><div class="sub-bar-fill" style="width:'+ss.score+'%;background:'+col(ss.score)+'"></div></div>'+
          '<div class="sub-detail">'+ss.detail+'</div>'+
        '</div>';
      }).join('');
      cnt.innerHTML=
        '<div class="ititle">📊 Mercati Finanziari Globali</div>'+
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+
          '<span style="font-size:28px;font-weight:800;color:'+col(mkts.score)+'">'+mkts.score+'</span>'+
          '<div><div style="font-size:11px;color:var(--mt)">Score composito</div>'+
          '<div style="font-size:12px;font-weight:600;color:'+col(mkts.score)+'">'+rlbl(mkts.score)+'</div></div>'+
        '</div>'+
        '<hr class="sub-divider">'+
        '<div class="sub-hd">10 sub-indici con pesi interni</div>'+
        subRows+
        '<div style="font-size:10px;color:#374151;margin-top:8px">Score composito = Σ(score × peso) / 100</div>';
    }
  } else {
    var d=SINFO[id];if(!d)return;
    cnt.innerHTML='<div class="ititle">'+d.title+'</div><div class="idesc">'+d.desc+'</div><div class="isrchd">Fonti dati principali</div>'+d.src.map(function(s){return'<div class="isrc">'+s+'</div>';}).join('');
  }
  document.getElementById('iov').classList.add('open');
}
function closeInfo(){document.getElementById('iov').classList.remove('open');}

/* ── LOAD ────────────────────────────────────────────────── */
async function load(){
  var ovl=document.getElementById('ovl');
  var lmsg=document.getElementById('lmsg');
  ovl.classList.add('on');
  lmsg.textContent='Caricamento dati…';
  try{
    var res=await fetch('/api/data');
    if(!res.ok){
      var e=await res.json().catch(function(){return{};});
      throw new Error(e.error||'Errore '+res.status);
    }
    var r=await res.json();
    var score=Math.max(0,Math.min(100,r.composite_score));
    lastSignals=r.signals;
    animScore(score);
    var pill=document.getElementById('rpill'),c=col(score);
    pill.textContent=r.risk_level||rlbl(score);
    pill.style.cssText='background:'+c+'22;color:'+c+';border:1px solid '+c+'44';
    document.getElementById('summ').textContent=r.summary||'';
    if(r._updated){
      var t=new Date(r._updated).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
      var isToday=new Date(r._updated).toDateString()===new Date().toDateString();
      var prefix=isToday?'oggi':new Date(r._updated).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
      document.getElementById('updtxt').textContent=prefix+' '+t+'  ·  prossimo '+nextUpdateTime();
      document.getElementById('upd').style.display='flex';
      var hoursOld=(Date.now()-new Date(r._updated).getTime())/3600000;
      document.getElementById('stale').style.display=hoursOld>14?'block':'none';
    }
    if(r.signals&&r.signals.length)renderSigs(r.signals);
    setTimeout(function(){drawSpark(r._history||[]);},50);
  }catch(err){
    document.getElementById('summ').textContent=err.message;
    console.error(err);
  }finally{
    ovl.classList.remove('on');
  }
}

window.addEventListener('DOMContentLoaded',function(){
  drawSpark();
  load();
});
</script>
</body>
</html>
